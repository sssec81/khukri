<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khukri — Download</title>
    <style>
        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Base ── */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            background: #1a1a1e;
            color: #e2e2e6;
            user-select: none;
        }

        /* ── Layout ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px 22px 16px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.02em;
        }

        .header-sub {
            font-size: 11px;
            color: #6b6b78;
        }

        /* ── File info ── */
        .file-info {
            background: #25252b;
            border: 1px solid #2e2e36;
            border-radius: 8px;
            padding: 10px 13px;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .file-name {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            display: flex;
            gap: 14px;
            font-size: 11px;
            color: #6b6b78;
        }

        .file-meta span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* ── Remember row ── */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 14px;
            font-size: 11px;
            color: #6b6b78;
            cursor: pointer;
        }

        .remember-row input[type="checkbox"] {
            accent-color: #e05c3a;
            width: 13px;
            height: 13px;
            cursor: pointer;
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            height: 36px;
            border: none;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.01em;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .btn-primary {
            background: #e05c3a;
            color: #ffffff;
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.88; }

        .btn-secondary {
            background: #2e2e36;
            color: #b0b0bb;
            border: 1px solid #3a3a44;
        }
        .btn-secondary:hover:not(:disabled) { background: #35353e; }

        /* ── Error state ── */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 10px;
            text-align: center;
        }

        .error-icon {
            font-size: 28px;
        }

        .error-msg {
            font-size: 12px;
            color: #6b6b78;
            max-width: 300px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <!-- Inline SVG khukuri blade icon — no external asset dependency -->
            <svg class="logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="28" height="28" rx="7" fill="#25252b"/>
                <path d="M6 20 L18 8 L22 10 L12 22 Z" fill="#e05c3a" opacity="0.9"/>
                <path d="M18 8 L22 10 L21 11 L17 9 Z" fill="#ff8060"/>
                <rect x="5" y="19" width="8" height="2.5" rx="1" fill="#3a3a44"/>
            </svg>
            <div class="header-text">
                <span class="header-title">Khukri Download Manager</span>
                <span class="header-sub">Where do you want to download this file?</span>
            </div>
        </div>

        <!-- File info -->
        <div class="file-info">
            <div class="file-name" id="filename">Loading…</div>
            <div class="file-meta">
                <span id="filesize">—</span>
                <span id="fileurl" title="">—</span>
            </div>
        </div>

        <!-- Remember preference -->
        <label class="remember-row">
            <input type="checkbox" id="rememberChk" />
            Remember my choice for this session
        </label>

        <!-- Buttons -->
        <div class="actions">
            <button class="btn btn-primary" id="startBtn">Start in Khukri</button>
            <button class="btn btn-secondary" id="keepBtn">Keep in Browser</button>
        </div>
    </div>

    <script src="prompt.js"></script>
</body>
</html>
